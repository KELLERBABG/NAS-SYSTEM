name: Remote Linux Container Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Musl Tools
        run: sudo apt-get install -y musl-tools

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build Static Binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Container Image and Save Tarball
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ghost-nas:latest
          outputs: type=docker,dest=/tmp/ghost-nas.tar

      - name: Upload Container Tarball
        uses: actions/upload-artifact@v4
        with:
          name: ghost-container
          path: /tmp/ghost-nas.tar
